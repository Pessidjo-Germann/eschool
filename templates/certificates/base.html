{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<style>
    .certificate-container {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 2rem 0;
    }
    
    .certificate-card {
        background: white;
        border-radius: 15px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        overflow: hidden;
        margin: 2rem auto;
        max-width: 800px;
    }
    
    .certificate-header {
        background: linear-gradient(45deg, #2c3e50 0%, #3498db 100%);
        color: white;
        padding: 2rem;
        text-align: center;
    }
    
    .certificate-badge {
        display: inline-block;
        background: rgba(255,255,255,0.2);
        padding: 0.5rem 1rem;
        border-radius: 50px;
        margin: 0.25rem;
        font-size: 0.85rem;
    }
    
    .certificate-preview {
        max-width: 100%;
        height: auto;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        margin: 1rem 0;
    }
    
    .btn-certificate {
        background: linear-gradient(45deg, #e74c3c, #c0392b);
        border: none;
        color: white;
        padding: 0.75rem 1.5rem;
        border-radius: 50px;
        margin: 0.5rem;
        transition: all 0.3s ease;
    }
    
    .btn-certificate:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        color: white;
    }
    
    .verification-section {
        background: #f8f9fa;
        padding: 2rem;
        border-radius: 10px;
        margin: 2rem 0;
    }
    
    .qr-code {
        text-align: center;
        margin: 1rem 0;
    }
    
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1rem;
        margin: 2rem 0;
    }
    
    .stat-card {
        background: white;
        padding: 1.5rem;
        border-radius: 10px;
        text-align: center;
        border-left: 4px solid #3498db;
    }
    
    .stat-number {
        font-size: 2rem;
        font-weight: bold;
        color: #2c3e50;
    }
    
    .stat-label {
        color: #7f8c8d;
        margin-top: 0.5rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="certificate-container">
    <div class="container">
        {% block certificate_content %}
        {% endblock %}
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// Fonctions JavaScript pour les certificats
function downloadCertificate(certificateId, format) {
    window.location.href = `/certificates/${certificateId}/download/${format}/`;
}

function shareCertificate(certificateId) {
    const url = window.location.origin + `/certificates/${certificateId}/?create_share=1`;
    window.location.href = url;
}

function copyCertificateLink(link) {
    navigator.clipboard.writeText(link).then(function() {
        alert('Lien copié dans le presse-papiers !');
    });
}

// Animation des cartes
document.addEventListener('DOMContentLoaded', function() {
    const cards = document.querySelectorAll('.certificate-card');
    cards.forEach((card, index) => {
        card.style.opacity = '0';
        card.style.transform = 'translateY(20px)';
        setTimeout(() => {
            card.style.transition = 'all 0.6s ease';
            card.style.opacity = '1';
            card.style.transform = 'translateY(0)';
        }, index * 200);
    });
});
</script>
{% endblock %}
