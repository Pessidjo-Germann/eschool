{% extends 'base.html' %}

{% block title %}Mot de passe réinitialisé - eSchool{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-lg-5 col-md-7">
                <div class="auth-card modern-card">
                    <div class="auth-header text-center">
                        <div class="auth-logo">
                            <div class="brand-icon text-success">
                                <i class="bi bi-check-circle-fill"></i>
                            </div>
                        </div>
                        <h2 class="auth-title">Mot de passe modifié !</h2>
                        <p class="auth-subtitle">
                            Votre mot de passe a été modifié avec succès.
                            Vous pouvez maintenant vous connecter avec votre nouveau mot de passe.
                        </p>
                    </div>

                    <div class="auth-body">
                        <div class="text-center">
                            <a href="{% url 'login' %}" class="btn modern-btn-filled">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
